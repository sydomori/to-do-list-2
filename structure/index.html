<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playwrite+IE:wght@100..400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/general.css">
  <link rel="stylesheet" href="../styles/main-content.css">
  <title>MY TODO LIST 📖</title>
</head>
<body>
  <header class="text-center">
    <h1 class="my-heading">MY TODO LIST 📖</h1>
  </header>
  <main>
    <div class="first-container">
      <form class="row g-3" id="to-do-form">

        <h3 class="add-todo-heading text-center">ADD TODO</h3>

        <div class="col-md-6">
          <label for="todo-input">Name</label>
          <input class="form-control" type="text" id="todo-input" placeholder="Add a new todo...">
        </div>

        <div class="col-md-6">
          <label for="todo-date">Date</label>
          <input class="form-control" type="date" id="todo-date" name="todo-date">
        </div>
        
        
        <div class="mb-3">
          <label for="todo-description">Description</label>
          <textarea class="form-control" id="todo-description" name="todo-description" rows="4" cols="50" placeholder="Add a description..."></textarea>
        </div>
      
        <div id="add-button">
          <button class="btn btn-primary" type="submit">ADD TODO</button>
        </div>
     </form>

     <div class="TODO LIST">
        <h3>TODO LIST 📚</h3>
        <div id="todo list">
          <ul>
            ... TODO LIST ITEMS...
          </ul>
       </div>
     </div>
   </div>
    
   <div class="second-container">
      <div class="COMPLETED TODOS">
        <h3>COMPLETED TODOS ✅</h3>
        <div id="completed-todos">
          <ul>
            ... COMPLETED TODOS ITEMS...
          </ul>
        </div>
      </div>
   </div>
   

  </main>
   
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/todo.js"></script>
</body>
</html>
