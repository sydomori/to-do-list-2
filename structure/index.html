<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY TODO LIST 📖</title>
</head>
<body>
  <header>MY TODO LIST 📖</header>
  <main>
    <h3>ADD TODO</h3>
    <div class="ADD TODO">
      <label for="todo-input">
        <input type="text" id="todo-input" placeholder="Add a new todo...">
      </label>

      <label for="todo-date">
        <input type="date" id="todo-date" name="todo-date">
      </label>

      <label for="todo-description">
        <input type="textarea" id="todo-description" placeholder="Add a description...">
      </label>

      <label for="todo-completed ">
        <input type="checkbox" name="todo-completed" id="todo-completed">Completed
      </label>
      <br>

      <label for="todo-uncompleted">
        <input type="checkbox" name="todo-uncompleted" id="todo-uncompleted">Uncompleted
      </label>
      <br>

      <div id="add button"><button type="submit">ADD TODO</button></div>
    </div>
  </main>

   <div class="TODO LIST">
    <h3>TODO LIST 📚</h3>
    <div id="todo list">
      <ul>
        ... TODO LIST ITEMS...
      </ul>
    </div>
  </div>

  <div class="COMPLETED TODOS">
    <h3>COMPLETED TODOS ✅</h3>
    <div id="completed-todos">
      <ul>
        ... COMPLETED TODOS ITEMS...
      </ul>
    </div>
  </div>
  
  
</body>
</html>
